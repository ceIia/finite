<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="20%" stop-color="#d4eaff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7eb8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pointGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambientGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <g clip-path="url(#roundedSquare)">
    <!-- Background star field -->
    <g opacity="0.2">
      <circle cx="90" cy="100" r="1" fill="#ffffff"/>
      <circle cx="420" cy="85" r="0.8" fill="#ffffff"/>
      <circle cx="65" cy="370" r="0.9" fill="#ffffff"/>
      <circle cx="440" cy="410" r="0.7" fill="#ffffff"/>
      <circle cx="130" cy="440" r="0.8" fill="#ffffff"/>
      <circle cx="395" cy="140" r="1" fill="#ffffff"/>
      <circle cx="78" cy="230" r="0.6" fill="#ffffff"/>
      <circle cx="435" cy="280" r="0.8" fill="#ffffff"/>
      <circle cx="180" cy="75" r="0.7" fill="#ffffff"/>
      <circle cx="340" cy="435" r="0.9" fill="#ffffff"/>
      <circle cx="310" cy="90" r="0.5" fill="#ffffff"/>
      <circle cx="460" cy="190" r="0.6" fill="#ffffff"/>
      <circle cx="55" cy="290" r="0.7" fill="#ffffff"/>
      <circle cx="200" cy="445" r="0.5" fill="#ffffff"/>
    </g>

    <!-- Ambient glow behind star -->
    <circle cx="256" cy="240" r="100" fill="#7eb8ff" opacity="0.08" filter="url(#ambientGlow)"/>

    <!-- Four-pointed star shape (main star) -->
    <g filter="url(#starGlow)">
      <!-- Vertical long spike -->
      <polygon
        points="256,100 262,220 256,240 250,220"
        fill="url(#coreGlow)"
        opacity="0.8"
      />
      <polygon
        points="256,380 250,260 256,240 262,260"
        fill="url(#coreGlow)"
        opacity="0.8"
      />

      <!-- Horizontal long spike -->
      <polygon
        points="116,240 236,234 256,240 236,246"
        fill="url(#coreGlow)"
        opacity="0.8"
      />
      <polygon
        points="396,240 276,246 256,240 276,234"
        fill="url(#coreGlow)"
        opacity="0.8"
      />

      <!-- Diagonal spikes (shorter) -->
      <polygon
        points="170,154 238,226 256,240 232,230"
        fill="#7eb8ff"
        opacity="0.3"
      />
      <polygon
        points="342,154 280,230 256,240 274,226"
        fill="#7eb8ff"
        opacity="0.3"
      />
      <polygon
        points="170,326 232,250 256,240 238,254"
        fill="#7eb8ff"
        opacity="0.3"
      />
      <polygon
        points="342,326 274,254 256,240 280,250"
        fill="#7eb8ff"
        opacity="0.3"
      />
    </g>

    <!-- Core -->
    <circle cx="256" cy="240" r="18" fill="#d4eaff" filter="url(#pointGlow)"/>
    <circle cx="256" cy="240" r="10" fill="#e8f2ff"/>
    <circle cx="256" cy="240" r="5" fill="#ffffff"/>

    <!-- Terminal cursor below the star -->
    <g opacity="0.7">
      <text
        x="256"
        y="420"
        text-anchor="middle"
        font-family="-apple-system, SF Mono, Menlo, monospace"
        font-size="36"
        font-weight="300"
        fill="#7eb8ff"
        filter="url(#pointGlow)"
      >&gt;_</text>
    </g>
  </g>
</svg>