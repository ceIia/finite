<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7eb8ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7eb8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a8d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle star field (tiny background stars) -->
  <g opacity="0.3">
    <circle cx="80" cy="90" r="1" fill="#ffffff"/>
    <circle cx="150" cy="60" r="0.8" fill="#ffffff"/>
    <circle cx="420" cy="100" r="1" fill="#ffffff"/>
    <circle cx="460" cy="200" r="0.7" fill="#ffffff"/>
    <circle cx="70" cy="300" r="0.8" fill="#ffffff"/>
    <circle cx="100" cy="420" r="1" fill="#ffffff"/>
    <circle cx="440" cy="380" r="0.9" fill="#ffffff"/>
    <circle cx="350" cy="450" r="0.7" fill="#ffffff"/>
    <circle cx="200" cy="440" r="0.8" fill="#ffffff"/>
    <circle cx="380" cy="70" r="0.9" fill="#ffffff"/>
    <circle cx="290" cy="85" r="0.7" fill="#ffffff"/>
    <circle cx="60" cy="180" r="0.8" fill="#ffffff"/>
    <circle cx="450" cy="300" r="0.7" fill="#ffffff"/>
    <circle cx="130" cy="350" r="0.9" fill="#ffffff"/>
    <circle cx="320" cy="420" r="0.7" fill="#ffffff"/>
  </g>

  <!-- Constellation connection lines -->
  <g filter="url(#lineGlow)">
    <line x1="156" y1="168" x2="256" y2="138" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="256" y1="138" x2="356" y2="178" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="256" y1="138" x2="226" y2="256" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="226" y1="256" x2="156" y2="168" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="226" y1="256" x2="316" y2="276" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="356" y1="178" x2="316" y2="276" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="316" y1="276" x2="376" y2="356" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="226" y1="256" x2="166" y2="346" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="166" y1="346" x2="256" y2="386" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
    <line x1="256" y1="386" x2="376" y2="356" stroke="#7eb8ff" stroke-width="1.5" stroke-opacity="0.35"/>
  </g>

  <!-- Constellation star nodes -->
  <g filter="url(#starGlow)">
    <!-- Top left node -->
    <circle cx="156" cy="168" r="18" fill="url(#glow2)"/>
    <circle cx="156" cy="168" r="5" fill="#c8e2ff"/>
    <circle cx="156" cy="168" r="2.5" fill="#ffffff"/>

    <!-- Top center node (brightest - primary star) -->
    <circle cx="256" cy="138" r="24" fill="url(#glow1)"/>
    <circle cx="256" cy="138" r="7" fill="#b8daff"/>
    <circle cx="256" cy="138" r="3.5" fill="#ffffff"/>

    <!-- Top right node -->
    <circle cx="356" cy="178" r="16" fill="url(#glow2)"/>
    <circle cx="356" cy="178" r="4.5" fill="#c8e2ff"/>
    <circle cx="356" cy="178" r="2" fill="#ffffff"/>

    <!-- Center left node -->
    <circle cx="226" cy="256" r="20" fill="url(#glow1)"/>
    <circle cx="226" cy="256" r="6" fill="#b8daff"/>
    <circle cx="226" cy="256" r="3" fill="#ffffff"/>

    <!-- Center right node -->
    <circle cx="316" cy="276" r="16" fill="url(#glow2)"/>
    <circle cx="316" cy="276" r="4.5" fill="#c8e2ff"/>
    <circle cx="316" cy="276" r="2" fill="#ffffff"/>

    <!-- Bottom left node -->
    <circle cx="166" cy="346" r="14" fill="url(#glow2)"/>
    <circle cx="166" cy="346" r="4" fill="#c8e2ff"/>
    <circle cx="166" cy="346" r="1.8" fill="#ffffff"/>

    <!-- Bottom center node -->
    <circle cx="256" cy="386" r="18" fill="url(#glow1)"/>
    <circle cx="256" cy="386" r="5.5" fill="#b8daff"/>
    <circle cx="256" cy="386" r="2.5" fill="#ffffff"/>

    <!-- Bottom right node -->
    <circle cx="376" cy="356" r="15" fill="url(#glow2)"/>
    <circle cx="376" cy="356" r="4.5" fill="#c8e2ff"/>
    <circle cx="376" cy="356" r="2" fill="#ffffff"/>
  </g>
</svg>