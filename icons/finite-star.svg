<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="15%" stop-color="#d4eaff" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#7eb8ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#4a90d9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7eb8ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4a7ab5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shellGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7eb8ff" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#4a7ab5" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="rayGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <g clip-path="url(#roundedSquare)">
    <!-- Subtle background stars -->
    <g opacity="0.25">
      <circle cx="85" cy="95" r="1" fill="#ffffff"/>
      <circle cx="430" cy="80" r="0.8" fill="#ffffff"/>
      <circle cx="60" cy="380" r="0.9" fill="#ffffff"/>
      <circle cx="445" cy="420" r="0.7" fill="#ffffff"/>
      <circle cx="120" cy="450" r="0.8" fill="#ffffff"/>
      <circle cx="400" cy="130" r="1" fill="#ffffff"/>
      <circle cx="75" cy="220" r="0.7" fill="#ffffff"/>
      <circle cx="440" cy="270" r="0.8" fill="#ffffff"/>
      <circle cx="170" cy="80" r="0.6" fill="#ffffff"/>
      <circle cx="350" cy="440" r="0.9" fill="#ffffff"/>
    </g>

    <!-- Outermost expansion shell -->
    <circle cx="256" cy="256" r="180" fill="url(#shellGlow)"/>

    <!-- Expanding shell rings (supernova remnant) -->
    <circle cx="256" cy="256" r="155" fill="none" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.06"/>
    <circle cx="256" cy="256" r="130" fill="none" stroke="#7eb8ff" stroke-width="1" stroke-opacity="0.1"/>
    <circle cx="256" cy="256" r="100" fill="none" stroke="#7eb8ff" stroke-width="1.2" stroke-opacity="0.15"/>

    <!-- Radial rays (contained energy burst) -->
    <g filter="url(#rayGlow)">
      <!-- 4 main rays (cross shape) -->
      <line x1="256" y1="256" x2="256" y2="96" stroke="#a8d4ff" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="256" y2="416" stroke="#a8d4ff" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="96" y2="256" stroke="#a8d4ff" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="416" y2="256" stroke="#a8d4ff" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round"/>

      <!-- 4 diagonal rays -->
      <line x1="256" y1="256" x2="143" y2="143" stroke="#8ec5ff" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="369" y2="143" stroke="#8ec5ff" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="143" y2="369" stroke="#8ec5ff" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="369" y2="369" stroke="#8ec5ff" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>

      <!-- 8 minor rays -->
      <line x1="256" y1="256" x2="178" y2="112" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="334" y2="112" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="112" y2="178" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="400" y2="178" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="112" y2="334" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="400" y2="334" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="178" y2="400" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
      <line x1="256" y1="256" x2="334" y2="400" stroke="#7eb8ff" stroke-width="0.8" stroke-opacity="0.15" stroke-linecap="round"/>
    </g>

    <!-- Outer glow -->
    <circle cx="256" cy="256" r="80" fill="url(#outerGlow)" filter="url(#bigGlow)"/>

    <!-- Core glow -->
    <circle cx="256" cy="256" r="60" fill="url(#coreGlow)" filter="url(#softGlow)"/>

    <!-- Bright core -->
    <circle cx="256" cy="256" r="14" fill="#d4eaff"/>
    <circle cx="256" cy="256" r="8" fill="#e8f2ff"/>
    <circle cx="256" cy="256" r="4" fill="#ffffff"/>
  </g>
</svg>