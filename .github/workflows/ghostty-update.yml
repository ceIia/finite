name: Check Ghostty Updates

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Ghostty release updates
        id: check
        run: |
          cd ghostty
          git fetch origin --tags

          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          CURRENT_SHA=$(git rev-parse --short HEAD)

          # Find the latest release tag (vX.Y.Z format)
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST_SHA=$(git rev-parse --short "$LATEST_TAG" 2>/dev/null || echo "unknown")

          echo "Current: $CURRENT_TAG ($CURRENT_SHA)"
          echo "Latest release: $LATEST_TAG ($LATEST_SHA)"

          if git merge-base --is-ancestor "$LATEST_TAG" HEAD; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "Already on or ahead of $LATEST_TAG"
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "current_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
            echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT

            # Get changelog between current and latest release
            {
              echo "commit_summary<<EOF"
              git log --oneline HEAD.."$LATEST_TAG" | head -30
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Create update branch and PR
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG="${{ steps.check.outputs.latest_tag }}"
          BRANCH="ghostty-update/${LATEST_TAG}"

          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for this update"
            exit 0
          fi

          # Checkout the release tag
          cd ghostty
          git checkout "$LATEST_TAG"
          cd ..

          # Create branch and commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add ghostty
          git commit -m "chore: bump ghostty to $LATEST_TAG"
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --title "Bump Ghostty to $LATEST_TAG" \
            --body "$(cat <<PR_EOF
          ## Ghostty ${{ steps.check.outputs.current_tag }} -> $LATEST_TAG

          ### Changes
          \`\`\`
          ${{ steps.check.outputs.commit_summary }}
          \`\`\`

          After merging, release with:
          \`\`\`
          cd Finite && make distribute
          \`\`\`
          PR_EOF
          )"
